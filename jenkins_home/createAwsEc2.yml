---
- name: Launch EC2 instance and add to Ansible inventory
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    key_name: python-pipeline-key
    key_path: "{{ lookup('env', 'HOME') }}/.ssh/python-pipeline-key"
    region: ap-south-1
    image_id: ami-0a14f53a6fe4dfcd1    # Ubuntu 22.04 (check if still available)
    instance_type: t3.small
    security_group: launch-wizard-5
    vpc_subnet_id: subnet-0a8e5dffcd31dea3d   # 🔁 Replace with your own subnet ID
    instance_tag_name: PythonSecurityPipeline-Server
    ansible_inventory_path: "{{ lookup('env', 'HOME') }}/ansible_hosts"

  tasks:
    - name: Upload SSH public key to AWS
      amazon.aws.ec2_key:
        name: "{{ key_name }}"
        key_material: "{{ lookup('file', key_path + '.pub') }}"
        region: "{{ region }}"

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ instance_tag_name }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ image_id }}"
        region: "{{ region }}"
        state: present
        wait: true
        vpc_subnet_id: "{{ vpc_subnet_id }}"
        network:
          assign_public_ip: true
          security_groups: [ "{{ security_group }}" ]
        tags:
          Name: "{{ instance_tag_name }}"
      register: ec2

    - name: Add instance IPs to ansible inventory under [tstlaunched]
      blockinfile:
        path: "{{ ansible_inventory_path }}"
        block: |
          {% for item in ec2.instances %}
          {{ item.public_ip }} ansible_user=ubuntu ansible_ssh_private_key_file={{ key_path }} ansible_python_interpreter=/usr/bin/python3
          {% endfor %}
        marker: "# {mark} ANSIBLE EC2 TEST HOSTS"
