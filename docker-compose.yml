version: "3.9"

services:
  jenkins-master:
    build:
      context: ./jenkins
    container_name: jenkins-master
    restart: always
    user: "1000:1000"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      Jenkins_PW: "${Jenkins_PW}"
      JAVA_OPTS: "-Xmx1024m"
      JenkinsPublicHostname: "${JenkinsPublicHostname}"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  selenium-chrome:
    image: selenium/standalone-chrome
    container_name: selenium-chrome
    restart: always
    shm_size: 2gb
    ports:
      - "127.0.0.1:4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444"]
      interval: 30s
      timeout: 10s
      retries: 3
