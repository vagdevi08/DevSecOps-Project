---
- name: Configure test environment on remote EC2 instances
  hosts: tstlaunched
  become: true
  remote_user: ubuntu
  gather_facts: true

  vars:
    app_tarball: /home/ubuntu/pythonapp.tar.gz
    app_directory: /home/ubuntu/gossip-world

  tasks:

    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Remove conflicting containerd
      apt:
        name: containerd
        state: absent

    - name: Remove old Docker packages
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
        purge: yes

    - name: Clean APT cache and remove unused packages
      apt:
        autoremove: yes
        purge: yes
        update_cache: yes

    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - kbtin
        state: present
        update_cache: yes
        force_apt_get: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Copy the Python app tarball
      copy:
        src: pythonapp.tar.gz
        dest: "{{ app_tarball }}"
        mode: '0644'

    - name: Extract the tarball
      unarchive:
        src: "{{ app_tarball }}"
        dest: /home/ubuntu/
        remote_src: yes

    - name: Run the application using Makefile
      make:
        chdir: "{{ app_directory }}"
        target: install
